server:
  port: 8888

spring:
  application:
    name: config-server

  profiles:
    active: ${SPRING_PROFILE:native}

  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_LOCATION:classpath:/config}

eureka:
  instance:
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://eureka-server:8761/eureka/}

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}